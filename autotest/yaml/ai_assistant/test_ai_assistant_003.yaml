description: '前置条件:

  1. 系统已安装符合要求的截图录屏版本

  2. UOS AI助手主界面已打开

  3. 输入框已上传3张截图（处于置灰状态）

  测试步骤:

  1. 在输入框中删除任意1张截图

  2. 观察''截图问答''入口状态

  3. 点击恢复后的''截图问答''入口

  预期结果:

  1. 输入框剩余1张截图和1个文件，计数更新为2/3

  2. 入口恢复可点击状态（非置灰样式）

  3. UOS AI界面隐藏，唤起截图录屏界面

  '
