name: AI助手-正常截图取消后自动返回UOSAI页面
app: deepin-screen-recorder
description: '前置条件:

  1. UOS AI助手已启动且处于主界面

  2. 截图录屏应用已安装并更新至支持截图问答的版本（版本号符合要求）

  3. 输入框当前无已上传截图

  测试步骤:

  1. 鼠标悬停UOS AI主界面的【截图问答】入口，查看提示文案是否为中文''截图问答 快捷键（Ctrl+Alt+Q），最多支持3张图''

  2. 点击【截图问答】入口

  3. 在截图录屏界面选择需要截取的区域，点击【X】

  4. 观察当前界面状态

  5. 查看UOS AI输入框文案

  预期结果:

  1. 提示文案显示正确

  2. UOS AI界面隐藏，唤起仅包含【x】和【√】按钮的截图录屏界面

  3. 退出截图

  4. 自动回到UOS AI主界面

  5. 输入框中仍然为空

  '
module: 截图录屏/AI助手
feature: 面板唤起
tags:
- L1
vars:
  xlsx_id: '1915801'
  case_type: 功能测试
steps: []
skip: 跳过-依赖UOS AI助手应用，非截图录屏独立可测试
setup: []
teardown: []
