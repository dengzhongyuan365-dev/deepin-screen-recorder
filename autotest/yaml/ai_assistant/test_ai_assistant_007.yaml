name: AI助手-输入框达到3张图时入口置灰
app: deepin-screen-recorder
description: '前置条件:

  1. UOS AI助手已安装并正常运行

  2. 截图录屏应用已更新至支持集成的版本

  3. 输入框内已上传3张图片

  测试步骤:

  1. 打开UOS AI助手主界面，确认输入框内已有3张图片

  2. 观察【截图问答】入口状态

  3. 尝试点击置灰的【截图问答】入口

  预期结果:

  1. 输入框显示3张图片缩略图

  2. 【截图问答】入口呈置灰状态（不可点击样式）

  3. 无界面响应（不唤起截图录屏界面）

  '
