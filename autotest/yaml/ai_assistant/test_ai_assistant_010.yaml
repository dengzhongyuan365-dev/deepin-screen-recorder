name: AI助手-截图录屏版本不符合时进行截图，点击去更新
app: deepin-screen-recorder
description: '前置条件:

  1. UOS AI助手已安装并正常运行

  2. 截图录屏应用版本低于要求的集成版本

  3. 系统可正常访问应用商店（非定制镜像）

  测试步骤:

  1. 打开UOS AI助手主界面

  2. 点击【截图问答】入口

  3. 点击"去更新"按钮

  预期结果:

  1. 成功进入UOS AI主界面，【截图问答】入口可见

  2. 不唤起截图录屏界面，弹出提示弹窗"需要将【截图录屏】应用更新到6.6版本以及以上版本，才可使用【截图问答】功能"

  3. 跳转到商店的【截图录屏】更新界面

  '
module: 截图录屏/AI助手
feature: 版本检查
tags:
- L2
