name: AI助手-双屏场景下可正常截图
app: deepin-screen-recorder
description: '前置条件:

  1. 电脑连接两个屏幕且模式为扩展

  2. UOS AI助手已安装并正常运行

  3. 输入框内图片数量小于3张（未触发入口置灰条件）

  测试步骤:

  1. 打开UOS AI助手主界面

  2. 点击【截图问答】入口

  3. 完整截取两个屏幕

  4. 删除截屏后再次进行截图

  5. 截取非UOS AI助手所在的另一个屏幕

  预期结果:

  1. 成功进入UOS AI主界面，【截图问答】入口可见

  2. UOS AI界面隐藏，唤起截图录屏界面，可自由选择两个屏幕

  3. 输入框内截图正常显示两个屏幕区域

  4. UOS AI界面隐藏，唤起截图录屏界面，可自由选择两个屏幕

  5. 输入框内截图正常显示另一个屏幕区域

  '
module: 截图录屏/AI助手
feature: 双屏支持
tags:
- L3
