name: AI助手-快捷键可以正常唤起截图
app: deepin-screen-recorder
description: '前置条件:

  1. UOS AI助手已启动且处于主界面

  2. 截图录屏应用已安装并更新至支持截图问答的版本（版本号符合要求）

  3. 输入框当前无已上传截图

  测试步骤:

  1. 打开UOS AI助手主界面

  2. 摁下ctrl+alt+q

  3. 选取截图区域，点击√并观察输入框

  预期结果:

  1. 成功进入UOS AI主界面，【截图问答】入口可见

  2. UOSAI窗口隐藏，唤起截图界面，界面仅显示【x】（关闭）和【√】（确认）按钮，无几何工具、保存按钮等其他工具条元素

  3. 自动回到UOS AI主界面并在输入框内显示已上传的截图文案

  '
module: 截图录屏/AI助手
feature: 面板唤起
tags:
- L1
vars:
