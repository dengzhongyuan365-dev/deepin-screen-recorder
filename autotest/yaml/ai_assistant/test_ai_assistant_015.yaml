name: AI助手-唤起ai截图后尝试使用系统截图录屏
app: deepin-screen-recorder
description: '前置条件:

  1. UOS AI助手已安装并正常运行

  2. 截图录屏应用已更新至支持与AI助手集成的版本（版本号符合要求）

  3. 输入框内图片数量小于3张（未触发入口置灰条件）

  测试步骤:

  1. 打开UOS AI助手主界面

  2. 点击主界面上的【截图问答】入口

  3. 摁下ctrl+alt+a

  预期结果:

  1. 成功进入UOS AI主界面，【截图问答】入口可见

  2. UOS AI界面隐藏，唤起截图录屏界面

  3. 界面无反应，仅显示【x】（关闭）和【√】（确认）按钮，无几何工具、保存按钮等其他工具条元素

  '
module: 截图录屏/AI助手
feature: 面板唤起
tags:
