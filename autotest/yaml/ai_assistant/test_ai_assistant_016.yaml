name: AI助手-输入框文件+图片达到3个时快捷键唤起截图-点击取消
app: deepin-screen-recorder
description: '前置条件:

  1. UOS AI助手已安装并正常运行

  2. 截图录屏应用已更新至支持集成的版本

  3. 输入框内已上传2张图片和1个文件

  测试步骤:

  1. 打开UOS AI助手主界面，确认输入框内已有2张图片和1个文件

  2. 观察【截图问答】入口状态

  3. 摁下ctrl+alt+q

  4. 点击【x】（关闭）按钮

  预期结果:

  1. 输入框显示2张图片缩略图和一个文件缩略图

  2. 【截图问答】入口呈置灰状态（不可点击样式）

  3. 无界面响应（不唤起截图录屏界面）

  4. 打开助手的面板，对话框已有2张图片和1个文件，/tmp/customsave目录没有刚刚截图的文件

  '
module: 截图录屏/AI助手
feature: 图片上传
tags:
- L1
vars:
  xlsx_id: '1915781'
  case_type: 功能测试
steps: []
skip: 跳过-依赖UOS AI助手应用，非截图录屏独立可测试
