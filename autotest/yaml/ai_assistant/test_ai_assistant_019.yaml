name: AI助手-输入框达到3张图时快捷键唤起截图，点击确认
app: deepin-screen-recorder
description: '前置条件:

  1. UOS AI助手已安装并正常运行

  2. 截图录屏应用已更新至支持集成的版本

  3. 输入框内已上传3张图片

  测试步骤:

  1. 打开UOS AI助手主界面，确认输入框内已有3张图片

  2. 观察【截图问答】入口状态

  3. 摁下ctrl+alt+q

  4. 点击【√】（确认）按钮

  预期结果:

  1. 输入框显示3张图片缩略图

  2. 【截图问答】入口呈置灰状态（不可点击样式）

  3. 唤起截图录屏界面

  4. 打开助手面板，对话框提示最多上传三个文件，截图文件暂存在/tmp/customsave

  '
module: 截图录屏/AI助手
feature: 图片上传
tags:
- L1
vars:
  xlsx_id: '1915775'
  case_type: 功能测试
