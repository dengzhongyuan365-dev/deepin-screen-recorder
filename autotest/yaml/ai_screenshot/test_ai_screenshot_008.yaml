name: AI截图功能-首次使用新功能提示显示与消失验证
app: deepin-screen-recorder
description: '前置条件: 从未点击过任何截图工具栏中的AI图标（首次使用场景）

  测试步骤:

  1. 唤醒截图工具，查看截图工具栏区域是否显示提示文案"截图已支持 AI 能力，点击体验"

  2. 点击截图工具栏中的AI图标

  3. 关闭当前截图工具，再次唤醒截图工具

  4. 查看截图工具栏区域是否还显示提示文案

  预期结果:

  1. 截图工具栏区域显示提示文案"截图已支持 AI 能力，点击体验"

  4. 截图工具栏区域未显示提示文案"截图已支持 AI 能力，点击体验"

  '
module: 截图录屏/AI截图
feature: 首次提示
