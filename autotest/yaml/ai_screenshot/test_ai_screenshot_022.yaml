description: '前置条件: 打开UOS AI助手页面，AI正在生成内容

  测试步骤:

  1. 唤起截图，点击AI截图，点击页面中的"问问AI"按钮

  2. 检查UOS AI输入框内容

  3. 检查生成内容的操作是否被打断

  4. 检查是否新建对话、切换智能体和模型、修改深度思考和联网开关

  预期结果:

  2. 截图内容成功带入UOS AI输入框

  3. 打断生成中的操作，截图内容带入至UOS AI输入框

  4. 没有新建对话、不切换智能体和模型、不修改深度思考和联网开关

  '
