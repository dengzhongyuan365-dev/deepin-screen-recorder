name: AI截图功能-语音输入中状态点击问问AI
app: deepin-screen-recorder
description: '前置条件: 打开UOS AI助手页面，处于语音输入中状态

  测试步骤:

  1. 点击页面中的"问问AI"按钮

  2. 检查语音输入状态（观察麦克风图标是否恢复为未激活状态）

  3. 检查UOS AI输入框内容

  4. 检查是否新建对话、切换智能体和模型、修改深度思考和联网开关

  预期结果:

  2. 打断语音输入，麦克风图标恢复为未激活状态

  3. 输入框中保留语音输入已转文字的内容，且截图内容成功带入UOS AI输入框

  4. 没有新建对话、不切换智能体和模型、不修改深度思考和联网开关

  '
module: 截图录屏/AI截图
feature: 问问AI
tags:
- L2
vars:
  xlsx_id: '1949911'
  case_type: 功能测试
steps: []
skip: 跳过-需要语音输入状态
setup: []
teardown: []
