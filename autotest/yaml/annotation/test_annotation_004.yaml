name: 几何工具-升级后参数重置验证
app: deepin-screen-recorder
description: '前置条件:

  1. 已安装截图工具旧版本

  2. 已设置几何工具为圆形+粗线条（3px+蓝色）

  3. 执行rm -r ~/.config/deepin/deepin-screen-recorder手动删除配置文件

  测试步骤:

  1. 将截图工具升级到新版本

  2. 打开截图工具，进入几何工具界面

  3. 检查矩形工具的描边粗细和颜色选择

  预期结果:

  1. 应用升级成功

  2. 几何工具默认显示为矩形工具

  3. 矩形工具的描边粗细显示为默认细线条（1px），颜色显示为默认红色

  '
module: 截图录屏/标注工具
feature: 参数重置
