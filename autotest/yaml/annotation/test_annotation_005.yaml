name: 几何工具-切换图形并修改参数再切换图形
app: deepin-screen-recorder
description: '前置条件:

  1. 打开截图工具，点击几何工具图标

  2. 已设置矩形为粗线条（3px+蓝色）

  测试步骤:

  1. 切换至圆形工具，点击描边粗细选择框，选择''细线条（1px）''，点击颜色选择框选择''红色''

  2. 切换回矩形工具

  3. 检查矩形工具的描边粗细和颜色选择

  预期结果:

  1. 圆形工具的描边粗细显示为''细线条（1px）''，颜色显示为''红色''

  2. 矩形图标变为选中状态，圆形图标取消选中

  3. 矩形工具的描边粗细显示为''粗线条（3px）''，颜色显示为''蓝色''

  '
module: 截图录屏/标注工具
feature: 几何工具参数记忆
tags:
- L2
vars:
  xlsx_id: '1915681'
  case_type: 功能测试
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 1400
    y: 700
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击几何工具按钮
  action: element_action
  ref: rect_button
  do: click
  wait: 0.5
- name: 设置矩形为粗线条3px
  action: element_action
  ref: thick_three_rect
  do: click
  wait: 0.3
- name: 设置矩形颜色为蓝色
  action: element_action
  ref: color_blue
  do: click
  wait: 0.3
- name: 切换至圆形工具
  action: element_action
  ref: circl_button
  do: click
  wait: 0.5
- name: 选择细线条1px
  action: element_action
  ref: thick_one_circ
  do: click
  wait: 0.3
- name: 选择红色
  action: element_action
  ref: color_red
  do: click
  wait: 0.3
- name: 验证圆形工具参数
  action: screenshot
- name: 切换回矩形工具
  action: element_action
  ref: rect_button
  do: click
  wait: 0.5
- name: 验证矩形工具参数保持粗线条3px蓝色
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
