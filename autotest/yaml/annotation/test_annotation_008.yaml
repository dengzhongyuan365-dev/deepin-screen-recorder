name: 几何工具-默认选中矩形
app: deepin-screen-recorder
description: '前置条件: 截图录屏已启动

  测试步骤:

  1. 点击截图工具栏的几何工具图标

  2. 检查''矩形''和''圆形''图标的选中状态

  3. 切换矩形工具和圆形工具，检查是否包含描边粗细和颜色选择

  预期结果:

  1. 图标下方显示''矩形''和''圆形''两个图标

  2. ''矩形''图标为默认选中状态（高亮）

  3. 包含描边粗细选择控件和颜色选择控件

  '
module: 截图录屏/标注工具
feature: 矩形默认
tags:
- L1
vars:
  xlsx_id: '1915671'
  case_type: 功能测试
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 1400
    y: 700
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击几何工具按钮
  action: element_action
  ref: rect_button
  do: click
  wait: 0.5
- name: 验证矩形和圆形图标显示
  action: screenshot
- name: 验证矩形默认选中
  action: element_action
  ref: rect_button
  do: click
  wait: 0.3
- name: 切换到圆形工具
  action: element_action
  ref: circl_button
  do: click
  wait: 0.5
- name: 验证描边粗细控件存在
  action: element_action
  ref: thick_one_circ
  do: click
  wait: 0.3
- name: 验证颜色选择控件存在
  action: element_action
  ref: color_red
  do: click
  wait: 0.3
- name: 截图验证整体状态
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
