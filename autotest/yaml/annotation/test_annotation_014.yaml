name: 工具栏-位置-全屏截取
app: deepin-screen-recorder
description: '前置条件: 无

  测试步骤:

  1. 移动截图区域为全屏截取

  预期结果:

  1. 工具栏展示在右上角

  '
module: 截图录屏/标注工具
feature: 工具栏位置
tags:
- L2
vars:
  xlsx_id: '1645807'
  case_type: 功能测试
steps:
- name: 全屏截图
  action: keyboard_hot_key
  keys: PrintScreen
  wait: 0.5
- name: 验证工具栏展示在右上角
  action: screenshot
- name: 截图验证
  action: screenshot
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
