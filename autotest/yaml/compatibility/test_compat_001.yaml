name: 兼容性测试-截图工具
app: deepin-screen-recorder
module: 截图录屏/兼容性
feature: 兼容性测试
tags:
- L0
vars:
  xlsx_id: '1644819'
  case_type: 兼容性测试
description: '测试步骤:

  1. 使用快捷键Ctrl+Alt+A进入截图模式

  2. 框选任意区域后，依次测试工具栏各工具功能

  3. 绘制不同图形，修改图形的大小、位置和属性

  预期结果:

  1. 成功进入截图模式

  2. 工具栏各工具按钮正常显示

  3. 可以更改属性绘制不同图形，可以更改绘制图形的大小位置和属性

  '
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 1400
    y: 700
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 验证矩形工具可用
  action: element_action
  ref: rect_button
  do: click
  wait: 0.5
- name: 绘制矩形
  action: mouse_drag
  start:
    x: 600
    y: 400
  end:
    x: 800
    y: 600
  wait: 0.5
- name: 验证圆形工具可用
  action: element_action
  ref: circl_button
  do: click
  wait: 0.5
- name: 绘制圆形
  action: mouse_drag
  start:
    x: 900
    y: 400
  end:
    x: 1100
    y: 600
  wait: 0.5
- name: 验证直线工具可用
  action: element_action
  ref: line_button
  do: click
  wait: 0.5
- name: 绘制直线
  action: mouse_drag
  start:
    x: 600
    y: 450
  end:
    x: 1200
    y: 550
  wait: 0.5
- name: 验证画笔工具可用
  action: element_action
  ref: pen_button
  do: click
  wait: 0.5
- name: 绘制画笔
  action: mouse_drag
  start:
    x: 700
    y: 350
  end:
    x: 900
    y: 650
  wait: 0.5
- name: 验证模糊工具可用
  action: element_action
  ref: mosaic_button
  do: click
  wait: 0.5
- name: 验证截图工具栏整体
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
