- L2
vars:
  xlsx_id: '1644515'
  case_type: 功能测试
description: '测试步骤:

  1. 打开任意应用窗口，使用快捷键Ctrl+Alt+R

  2. 点击应用窗口

  3. 手动框选任意区域

  4. 在工具栏选项中，选择保存文件格式选择MKV/GIF/MP4，点击录屏图标

  5. 点击任务栏中录屏终止图标

  预期结果:

  1. 成功调出录屏工具

  2. 自动选中当前打开的窗口

  3. 支持手动选择区域

  4. 开始录屏，任务栏中显示录屏时长

  5. 能够保存为对应格式的视频文件（MIPS不能保存GIF格式）

  '
