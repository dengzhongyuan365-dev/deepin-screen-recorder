name: 【埋点检查】ocr截图B4
app: deepin-screen-recorder
module: 截图录屏/埋点
feature: OCR埋点
tags:
- L0
vars:
  xlsx_id: '1996901'
  case_type: 功能测试
  startup_mode: B4
description: "测试步骤:\n  1. 打开终端，cd /var/lib/deepin/event-log 目录，执行 ls 查看当前日志文件\n  2.\
  \ 按快捷键 Ctrl+Alt+A 进入截图模式，然后按 Alt+O 执行OCR截图\n  3. 在终端执行 cat event_*.log 查看日志内容\n\
  预期结果:\n  1. 成功进入 event-log 目录，存在 event_xxxxxxx.log 文件\n  2. OCR截图操作正常执行\n  3. 日志中包含\
  \ JSON 数据，startup_mode 字段值为 \"B4\"，package 为 \"deepin-screen-recorder\"\n"
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
steps:
  - name: "按快捷键Ctrl+Alt+A进入截图模式"
    action: keyboard_press
    keys: "ctrl+alt+A"
    wait: 0.5
  - name: "按Alt+O执行OCR截图"
    action: keyboard_press
    keys: "alt+O"
    wait: 1.0
  - name: "等待OCR截图操作完成"
    action: wait
    wait: 0.3
teardown:
  - action: keyboard_press
    keys: "Escape"
