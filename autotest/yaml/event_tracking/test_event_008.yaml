name: 【埋点检查】贴图B8
app: deepin-screen-recorder
module: 截图录屏/埋点
feature: 贴图埋点
tags:
- L3
vars:
  xlsx_id: '1996911'
  case_type: 功能测试
  startup_mode: B8
description: "测试步骤:\n  1. 打开终端，cd /var/lib/deepin/event-log 目录，执行 ls 查看当前日志文件\n  2.\
  \ 按快捷键 Ctrl+Alt+A 进入截图模式，框选区域后点击贴图按钮\n  3. 在终端执行 cat event_*.log 查看日志内容\n预期结果:\n\
  \  1. 成功进入 event-log 目录，存在 event_xxxxxxx.log 文件\n  2. 贴图操作正常执行\n  3. 日志中包含 JSON\
  \ 数据，startup_mode 字段值为 \"B8\"，package 为 \"deepin-screen-recorder\"\n"
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
steps:
  - name: "按快捷键Ctrl+Alt+A进入截图模式"
    action: keyboard_press
    keys: "ctrl+alt+A"
    wait: 0.5
  - name: "框选截图区域"
    action: mouse_drag
    ref: screen_bottom_right
    wait: 0.5
  - name: "点击贴图按钮"
    action: element_action
    ref: pinscreenshots_button
    do: "click"
    wait: 0.3
  - name: "等待贴图操作完成"
    action: wait
    wait: 0.3
teardown:
  - action: keyboard_press
    keys: "Escape"
