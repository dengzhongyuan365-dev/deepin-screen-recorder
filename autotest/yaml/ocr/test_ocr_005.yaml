name: '[core]OCR-识别状态'
app: deepin-screen-recorder
module: 截图录屏/OCR
feature: 文字识别
tags:
- L1
vars:
  xlsx_id: '1645889'
  case_type: 功能测试
description: '测试步骤: 1.通过截图录屏，框选含有文字的图像 2.点击OCR按钮，进入OCR功能 3.观察识别过程界面状态

  预期结果: 图片区域呈现透明蒙层，表现识别中状态；文本区域显示正在识别；复制和保存TXT按钮置灰不可点击

  '
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 1400
    y: 700
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击OCR按钮
  action: element_action
  ref: ocr_button
  do: click
  wait: 0.5
- name: 验证OCR识别中状态
  action: screenshot
- name: 等待识别完成
  action: wait
  wait: 5.0
- name: 验证识别完成状态
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
