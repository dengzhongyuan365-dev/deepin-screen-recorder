name: 贴图功能栏-保存到指定位置后点击OCR识别
app: deepin-screen-recorder
module: 截图录屏/OCR
feature: 复制保存
tags:
- L2
vars:
  xlsx_id: '1645401'
  case_type: 功能测试
description: '测试步骤: 1.点击贴图1 2.点击功能栏选项按钮 3.选择保存到指定位置 4.点击功能栏OCR识别按钮 5.点击文件选择框保存按钮

  预期结果: 1.贴图1被激活 2.打开选项列表 3.成功选择保存到指定位置并收起选项列表 4.打开保存文件选择对话框 5.保存贴图打开OCR界面

  '
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 1400
    y: 700
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 2.0
- name: 点击功能栏选项按钮
  action: element_action
  ref: shot_option_button
  do: click
  wait: 1.0
- name: 选择保存到指定位置-桌面
  action: element_action
  ref: shot_save_desktop
  do: click
  wait: 0.5
- name: 点击OCR识别按钮
  action: element_action
  ref: ocr_button
  do: click
  wait: 1.0
- name: 在文件选择框中点击保存
  action: keyboard_press
  keys: Return
  wait: 2.0
- name: 验证OCR界面已打开
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
