name: 贴图工具条-多贴图场景下悬停单个贴图仅对应工具条浮现
app: deepin-screen-recorder
module: 截图录屏/贴图
feature: 贴图工具栏
tags:
- L1
vars:
  xlsx_id: '1915769'
  case_type: 功能测试
description: "测试步骤:\n  1. 打开截图录屏工具，进入截图模式\n  2. 截取区域后点击贴图按钮，创建第1个贴图\n  3. 再次截图并创建第2个贴图（不同位置）\n\
  \  4. 再次截图并创建第3个贴图（不同位置）\n  5. 确认所有贴图工具条均处于隐藏状态\n  6. 将鼠标指针悬停在第一个贴图区域，停留1秒\n  7.\
  \ 将鼠标指针移至第二个贴图区域，停留1秒\n预期结果:\n  6. 仅第一个贴图的工具条浮现，其他贴图工具条保持隐藏\n  7. 第一个贴图工具条隐藏，第二个贴图工具条浮现\n"
steps:
- name: 唤起截图模式并创建第1个贴图
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 200
    y: 200
  end:
    x: 600
    y: 400
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 唤起截图模式并创建第2个贴图
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 800
    y: 500
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 唤起截图模式并创建第3个贴图
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 600
    y: 400
  end:
    x: 1000
    y: 600
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 将鼠标移至桌面空白处确保工具条隐藏
  action: mouse_move
  x: 1900
  y: 1000
  wait: 1.5
- name: 悬停第1个贴图区域
  action: mouse_move
  x: 400
  y: 300
  wait: 1.5
- name: 验证悬停第1个贴图后截图结果
  action: screenshot
- name: 悬停第2个贴图区域
  action: mouse_move
  x: 600
  y: 400
  wait: 1.5
- name: 验证悬停第2个贴图后截图结果
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
