name: 贴图工具条-鼠标悬停贴图边缘区域工具条浮现
app: deepin-screen-recorder
module: 截图录屏/贴图
feature: 贴图工具栏
tags:
- L2
vars:
  xlsx_id: '1915765'
  case_type: 功能测试
description: "测试步骤:\n  1. 打开截图录屏工具，进入截图模式\n  2. 截取区域后点击贴图按钮，创建1个贴图\n  3. 确认工具条处于隐藏状态\n\
  \  4. 将鼠标指针移动至贴图边缘区域（距离贴图上边缘1像素内），停留1秒\n预期结果:\n  4. 贴图工具条自动浮现\n"
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 800
    y: 500
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 将鼠标移至桌面空白处确保工具条隐藏
  action: mouse_move
  x: 1900
  y: 1000
  wait: 1.5
- name: 鼠标悬停贴图上边缘区域
  action: mouse_move
  x: 600
  y: 301
  wait: 1.5
- name: 验证工具条浮现
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
