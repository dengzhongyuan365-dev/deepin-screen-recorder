name: 贴图工具条-多贴图场景下默认隐藏验证
app: deepin-screen-recorder
module: 截图录屏/贴图
feature: 贴图工具栏
tags:
- L2
vars:
  xlsx_id: '1915761'
  case_type: 功能测试
description: "测试步骤:\n  1. 打开截图录屏工具，进入截图模式\n  2. 截取区域后点击贴图按钮，连续创建3张不同位置的贴图\n  3. 确保鼠标未悬停在任意一张贴图区域\n\
  \  4. 观察所有已插入贴图的对应工具条显示状态\n预期结果:\n  4. 所有贴图的工具条均未显示（全部处于隐藏状态）\n"
steps:
- name: 唤起截图模式并创建第1个贴图
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 200
    y: 200
  end:
    x: 600
    y: 400
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 唤起截图模式并创建第2个贴图
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 800
    y: 500
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 唤起截图模式并创建第3个贴图
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 600
    y: 400
  end:
    x: 1000
    y: 600
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 将鼠标移至桌面空白处远离所有贴图
  action: mouse_move
  x: 1900
  y: 1000
  wait: 2.0
- name: 验证所有工具条均隐藏
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
