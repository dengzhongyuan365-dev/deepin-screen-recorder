name: 贴图层级检查-有多张未激活的贴图时，最新的贴图在最上层
app: deepin-screen-recorder
module: 截图录屏/贴图
feature: 贴图层级
tags:
- L2
vars:
  xlsx_id: '1645447'
  case_type: 功能测试
description: "测试步骤:\n  1. 打开截图录屏工具，进入截图模式\n  2. 选择截图区域\n  3. 单击工具栏贴图按钮，进入贴图模式\n  4.\
  \ 重复步骤1-3创建多张贴图\n  5. 查看最新贴图层级\n预期结果:\n  2. 成功选择区域\n  3. 最新的贴图在最上层\n"
steps:
- name: 唤起截图模式并创建第1个贴图
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 300
    y: 300
  end:
    x: 700
    y: 500
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 唤起截图模式并创建第2个贴图
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域（与第1个重叠）
  action: mouse_drag
  start:
    x: 400
    y: 350
  end:
    x: 800
    y: 550
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 唤起截图模式并创建第3个贴图
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域（与前面重叠）
  action: mouse_drag
  start:
    x: 500
    y: 400
  end:
    x: 900
    y: 600
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 将鼠标移至桌面空白处
  action: mouse_move
  x: 1900
  y: 1000
  wait: 1.0
- name: 验证最新贴图在最上层
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
