name: 贴图功能栏-快捷键打开、收起功能栏选项列表
app: deepin-screen-recorder
module: 截图录屏/贴图
feature: 贴图工具栏
tags:
- L2
vars:
  xlsx_id: '1645379'
  case_type: 功能测试
description: "测试步骤:\n  1. 创建贴图后点击贴图1\n  2. 按快捷键F3\n  3. 再按Esc\n预期结果:\n  1. 贴图1被激活\n\
  \  2. 功能栏选项列表被打开\n  3. 功能栏选项列表被收起\n"
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 800
    y: 500
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮生成贴图
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 点击贴图激活
  action: mouse_click
  x: 600
  y: 400
  wait: 0.5
- name: 按F3打开功能栏选项列表
  action: keyboard_press
  keys: F3
  wait: 0.5
- name: 验证选项列表已打开
  action: screenshot
- name: 按Esc收起选项列表
  action: keyboard_press
  keys: Escape
  wait: 0.5
- name: 验证选项列表已收起
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
