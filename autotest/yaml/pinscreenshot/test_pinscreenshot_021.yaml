name: 贴图功能栏-功能栏选项列表快捷键选择值
app: deepin-screen-recorder
module: 截图录屏/贴图
feature: 贴图工具栏
tags:
- L2
vars:
  xlsx_id: '1645367'
  case_type: 功能测试
description: "测试步骤:\n  1. 创建贴图后点击贴图1\n  2. 按快捷键F3\n  3. 按方向键【↓】\n  4. 按Enter键\n  5.\
  \ 按快捷键F3\n  6. 按方向键【↑】\n  7. 按Enter键\n预期结果:\n  1. 贴图1被激活\n  2. 功能栏选项列表被打开\n  3.\
  \ 选择桌面\n  4. 收起功能栏选项列表\n  5. 功能栏选项列表被打开\n  6. 选择BMP\n  7. 收起功能栏选项列表\n"
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 800
    y: 500
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮生成贴图
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 点击贴图激活
  action: mouse_click
  x: 600
  y: 400
  wait: 0.5
- name: 按F3打开选项列表
  action: keyboard_press
  keys: F3
  wait: 0.5
- name: 按下方向键
  action: keyboard_press
  keys: Down
  wait: 0.3
- name: 按Enter确认选择桌面
  action: keyboard_press
  keys: Return
  wait: 0.5
- name: 验证已选择桌面
  action: screenshot
- name: 按F3再次打开选项列表
  action: keyboard_press
  keys: F3
  wait: 0.5
- name: 按上方向键
  action: keyboard_press
  keys: Up
  wait: 0.3
- name: 按Enter确认选择BMP
  action: keyboard_press
  keys: Return
  wait: 0.5
- name: 验证已选择BMP
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
