name: 贴图功能栏-保存贴图到剪切板后通知栏消息验证
app: deepin-screen-recorder
module: 截图录屏/贴图
feature: 贴图保存
tags:
- L2
vars:
  xlsx_id: '1645319'
  case_type: 功能测试
description: "测试步骤:\n  1. 创建贴图后点击贴图1，按F3打开选项，选择保存到剪切板\n  2. 点击功能栏最右侧【保存】按钮\n  3. 查看屏幕上方系统通知\n\
预期结果:\n  1. 贴图1被激活，成功选择保存到剪切板\n  2. 保存贴图1\n  3. 通知：截图完成\n"
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 800
    y: 500
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击贴图按钮生成贴图
  action: element_action
  ref: pinscreenshots_button
  do: click
  wait: 1.0
- name: 点击贴图激活
  action: mouse_click
  x: 600
  y: 400
  wait: 0.5
- name: 按F3打开选项列表
  action: keyboard_press
  keys: F3
  wait: 0.5
- name: 选择剪切板选项
  action: keyboard_press
  keys: Down
  wait: 0.3
- name: 按Enter确认选择
  action: keyboard_press
  keys: Return
  wait: 0.5
- name: 点击保存按钮
  action: element_action
  ref: save_local_button
  do: click
  wait: 2.0
- name: 验证通知栏消息
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
