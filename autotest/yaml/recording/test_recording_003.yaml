name: 声音选项记忆-多次切换系统音频状态后保持最后一次状态
app: deepin-screen-recorder
description: '前置条件:

  1. 设备未进行过应用升级或重装

  2. 录屏功能已安装且正常运行

  3. 初始状态下录屏设置中系统音频选项为开启状态

  测试步骤:

  1. 打开录屏功能，进入录屏设置界面

  2. 点击系统音频选项开关关闭系统音频

  3. 再次点击系统音频选项开关打开系统音频

  4. 关闭录屏设置界面，重启设备

  5. 再次打开录屏功能，进入录屏设置界面

  预期结果:

  1. 成功进入录屏设置界面，系统音频选项显示为开启状态

  2. 系统音频选项开关变为关闭状态

  3. 系统音频选项开关变为开启状态

  4. 设备正常重启完成

  5. 成功进入录屏设置界面，系统音频选项保持最后一次操作的开启状态

  '
module: 截图录屏/录屏
feature: 音频选项
tags:
- L2
