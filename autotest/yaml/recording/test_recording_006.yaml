name: 声音选项记忆-开关机后仍记住系统音频状态
app: deepin-screen-recorder
description: '前置条件:

  1. 设备未进行过应用升级或重装

  2. 录屏功能已安装且正常运行

  测试步骤:

  1. 打开录屏功能，进入录屏设置界面

  2. 点击系统音频选项开关，关闭系统音频

  3. 关闭录屏设置界面，重启设备

  4. 再次打开录屏功能，进入录屏设置界面

  5. 重复以上四条步骤，重启设备前将系统音频设置为开启状态

  预期结果:

  1. 成功进入录屏设置界面，系统音频选项显示为开启状态

  2. 系统音频选项开关变为关闭状态

  3. 设备正常重启完成

  4. 成功进入录屏设置界面，系统音频选项保持关闭状态

  5. 成功进入录屏设置界面，系统音频选项保持开启状态

  '
module: 截图录屏/录屏
feature: 音频选项
tags:
- L2
vars:
