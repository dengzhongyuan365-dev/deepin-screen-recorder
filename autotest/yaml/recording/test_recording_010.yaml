name: 声音选项记忆-开关机后仍记住麦克风状态
app: deepin-screen-recorder
description: '前置条件:

  1. 设备未进行过应用升级或重装

  2. 录屏功能已安装且正常运行

  3. 电脑已接入麦克风设备

  测试步骤:

  1. 打开录屏功能，进入录屏设置界面

  2. 点击麦克风选项开关，关闭麦克风

  3. 关闭录屏设置界面，重启设备

  4. 再次打开录屏功能，进入录屏设置界面

  5. 重复以上四条步骤，重启设备前将麦克风设置为开启状态

  预期结果:

  1. 成功进入录屏设置界面，麦克风选项显示为开启状态

  2. 麦克风选项开关变为关闭状态

  3. 设备正常重启完成

  4. 成功进入录屏设置界面，麦克风选项保持关闭状态

  5. 成功进入录屏设置界面，麦克风选项保持开启状态

  '
module: 截图录屏/录屏
feature: 音频选项
tags:
