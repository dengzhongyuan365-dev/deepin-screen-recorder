name: 工具栏-位置-屏幕边界时录屏-屏幕左下角
app: deepin-screen-recorder
description: |
  前置条件: 无
  测试步骤:
  1. 移动录屏区域至屏幕左下角
  预期结果:
  1. 工具栏展示在录屏区域上方
module: 截图录屏/录屏
feature: 启动录屏
tags:
- L3
vars:
  xlsx_id: '1645259'
  case_type: 功能测试
steps:
- name: "激活录屏模式"
  action: keyboard_hot_key
  keys: ctrl,alt,r
  wait: 1.0
- name: "在屏幕左下角框选录屏区域"
  action: mouse_drag
  start:
    x: 100
    y: 900
  end:
    x: 400
    y: 1000
  wait: 0.5
- name: "等待工具栏出现"
  action: wait
  wait: 1.0
- name: "验证工具栏出现在录屏区域上方"
  action: wait
  wait: 0.3
  assert:
    - type: element_visible
      selector:
        name: audio_button
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.5
