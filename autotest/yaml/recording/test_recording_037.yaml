name: '[core]连接双屏显示器使用截图录屏'
app: deepin-screen-recorder
description: '前置条件: 无

  测试步骤:

  1. 打开截图录屏，分别在主屏/副屏进行指定区域截图、满屏截图

  2. 设置屏幕1.25倍缩放，然后再操作步骤1

  3. 主副屏设置不同分辨率，操作步骤1

  4. 设置副屏分辨率高于主屏分辨率，然后在副屏进行步骤1

  5. 跨屏幕操作截图功能

  6. 打开截图录屏，在不同分辨率下，分别对主/副屏或跨屏幕进行录屏操作

  7. 笔记本电脑外接显示器，复测上述步骤的截图录屏功能

  预期结果:

  1. 截图成功，截图过程中无菜单栏/按钮/缩略视窗偏离、遮挡或显示异常

  2. 截图功能正常，显示正常

  3. 截图功能正常，显示正常

  4. 截图功能正常，显示正常

  5. 截图功能正常，显示正常

  6. 截图功能正常，显示正常

  7. 截图录屏功能正常

  '
module: 截图录屏/录屏
feature: 多屏
