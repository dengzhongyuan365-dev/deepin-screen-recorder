name: 【录制】双屏扩展模式：长时间操作窗口，录屏保存验证
app: deepin-screen-recorder
description: '前置条件:

  1. 连接双屏，设为扩展模式

  2. 开启录屏功能

  测试步骤:

  1. 录屏过程中操作打开任意几个窗口（音乐/影院/文管/......）

  2. 对窗口进行更改窗口尺寸、移动窗口、关闭窗口等操作

  3. 持续操作10分钟后点击录屏结束按钮

  预期结果:

  1. 打开成功

  2. 相应操作

  3. 保存录屏文件成功

  '
