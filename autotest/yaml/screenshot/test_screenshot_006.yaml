name: 区域大小-区域尺寸
app: deepin-screen-recorder
description: '前置条件: 无

  测试步骤:

  1. 放大录屏区域

  预期结果:

  1. 录屏区域右上角尺寸增大

  '
module: 截图录屏/截图基础
feature: 区域选择
tags:
- L3
vars:
  xlsx_id: '1645127'
  case_type: 功能测试
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 0.5
- name: 框选一个截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 1400
    y: 700
  wait: 0.3
- name: 拖拽右下角放大选择区域
  action: mouse_drag
  start:
    x: 1400
    y: 700
  end:
    x: 1700
    y: 900
  wait: 0.3
- name: 验证区域尺寸增大
  action: screenshot
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
