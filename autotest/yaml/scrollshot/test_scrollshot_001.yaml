name: 滚动截图-滚动截图后，ocr识别正常
app: deepin-screen-recorder
description: '前置条件: 无

  测试步骤:

  1. 滚动截图任意区域

  2. 点击ocr

  预期结果:

  1. 正常滚动截图

  2. 正常识别滚动截图的内容

  '
module: 截图录屏/滚动截图
feature: OCR识别
tags:
- L2
vars:
  xlsx_id: '1646077'
  case_type: 功能测试
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 1400
    y: 700
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击滚动截图按钮
  action: element_action
  ref: scrollshot_button
  do: click
  wait: 1.0
- name: 鼠标移至捕捉区内
  action: mouse_move
  x: 800
  y: 500
  wait: 0.5
- name: 单击捕捉区域开始自动滚动截图
  action: mouse_click
  x: 800
  y: 500
  wait: 5.0
- name: 点击截图按钮完成截图
  action: element_action
  ref: shot_button
  do: click
  wait: 1.0
- name: 点击OCR按钮
  action: element_action
  ref: ocr_button
  do: click
  wait: 2.0
- name: 验证OCR识别结果
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
