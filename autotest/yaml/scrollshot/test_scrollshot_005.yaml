name: 截长图-异常交互-提示
app: deepin-screen-recorder
description: '前置条件: 无

  测试步骤:

  1. 鼠标移至滚动区内

  2. 鼠标单击滚动区域

  3. 等待2S

  预期结果:

  1. 滚动区高亮

  2. 开始滚动

  3. 提示自动消失

  '
module: 截图录屏/滚动截图
feature: 异常交互
tags:
- L3
vars:
  xlsx_id: '1645715'
  case_type: 功能测试
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 1400
    y: 700
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击滚动截图按钮
  action: element_action
  ref: scrollshot_button
  do: click
  wait: 1.0
- name: 鼠标移至滚动区内
  action: mouse_move
  x: 800
  y: 500
  wait: 0.5
- name: 鼠标单击滚动区域
  action: mouse_click
  x: 800
  y: 500
  wait: 2.0
- name: 验证提示自动消失
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
