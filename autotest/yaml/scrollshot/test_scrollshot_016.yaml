name: 截长图-滚动方式切换-手动切自动
app: deepin-screen-recorder
description: '前置条件: 无

  测试步骤:

  1. 光标移动至捕捉区内

  2. 滑动鼠标滚轮

  3. 单击捕捉区

  预期结果:

  1. 捕捉区高亮

  2. 开始手动滚动截图

  3. 切换为自动继续滚动截图

  '
module: 截图录屏/滚动截图
feature: 滚动方式切换
tags:
- L1
vars:
  xlsx_id: '1645611'
  case_type: 功能测试
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 400
    y: 300
  end:
    x: 1400
    y: 700
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击滚动截图按钮
  action: element_action
  ref: scrollshot_button
  do: click
  wait: 1.0
- name: 光标移动至捕捉区内
  action: mouse_move
  x: 800
  y: 500
  wait: 0.5
- name: 滑动鼠标滚轮开始手动滚动
  action: mouse_scroll
  x: 800
  y: 500
  direction: up
  clicks: 3
  wait: 1.0
- name: 验证手动滚动
  action: screenshot
- name: 单击捕捉区切换为自动
  action: mouse_click
  x: 800
  y: 500
  wait: 3.0
- name: 验证恢复自动滚动
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
