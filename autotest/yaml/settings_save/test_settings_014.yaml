name: 储存逻辑-已截图保存在指定位置-图片
app: deepin-screen-recorder
module: 截图录屏/设置
feature: 指定位置
tags:
- L2
vars:
  xlsx_id: '1915729'
  case_type: 功能测试
description: '前置条件: 1. 截图工具已安装并启动 2.保存方式设置为指定位置-图片

  测试步骤:

  1. 框选任意区域，点击保存按钮

  预期结果:

  1. 截图成功，图片目录新增截图文件

  '
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 200
    y: 200
  end:
    x: 800
    y: 600
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 按Enter完成截图
  action: keyboard_press
  keys: Return
  wait: 1.0
- name: 验证截图保存结果
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
