name: 储存逻辑-每次询问时保存时，修改路径为只读目录
app: deepin-screen-recorder
module: 截图录屏/设置
feature: 每次询问
tags:
- L2
vars:
  xlsx_id: '1915709'
  case_type: 功能测试
description: '前置条件: 1. 截图工具已安装并启动 2.保存方式设置为每次询问 3.存在test目录只读 4.首次截图保存（rm -r ～/.config/deepin/deepin-screen-recorder）

  测试步骤:

  1. 框选任意区域，点击保存按钮

  2. 检查文管窗口默认显示路径

  3. 修改保存路径为test，点击保存按钮

  预期结果:

  1. 打开文管窗口

  2. 默认显示为桌面

  3. 截图失败，提示"保存失败，请保存在当前用户目录下"

  '
steps:
- name: 清除配置并创建只读test目录
  action: exec
  command: rm -rf ~/.config/deepin/deepin-screen-recorder && mkdir -p ~/Desktop/test && chmod 000 ~/Desktop/test
  wait: 0.3
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 200
    y: 200
  end:
    x: 800
    y: 600
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击保存按钮打开菜单
  action: element_action
  ref: save_local_button
  do: click
  wait: 0.5
- name: 等待菜单展开
  action: wait
  wait: 0.5
- name: 选择每次询问
  action: main_menu_comb
  ref: save_menu_ask
  wait: 0.5
- name: 点击保存按钮
  action: element_action
  ref: save_local_button
  do: click
  wait: 1.0
- name: 验证文管窗口默认路径
  action: screenshot
- name: 恢复test目录权限并清理
  action: exec
  command: chmod 755 ~/Desktop/test && rm -rf ~/Desktop/test
  wait: 0.3
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
