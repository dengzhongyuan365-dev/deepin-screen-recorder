name: 储存逻辑-首次使用时默认存储路径为桌面
app: deepin-screen-recorder
module: 截图录屏/设置
feature: 默认路径
tags:
- L1
vars:
  xlsx_id: '1915697'
  case_type: 功能测试
description: '前置条件: 1. 截图工具已安装并启动； 2. 未进行过任何截图保存操作（确保无历史路径记录） 3.首次截图保存（rm -r ～/.config/deepin/deepin-screen-recorder）

  测试步骤:

  1. 启动截图录屏，完成矩形区域截图（非滚动截图）

  2. 点击设置按钮，鼠标hover到保存方式->指定位置，并观察选项

  3. 点击保存方式->每次询问

  4. 点击保存并观察文管弹窗显示路径

  预期结果:

  1. 截图工具条正常显示

  2. 打开三级菜单，显示桌面、图片、自定义位置三个选项

  3. 设置栏消失

  4. 默认路径为桌面

  '
steps:
- name: 清除配置
  action: exec
  command: rm -rf ~/.config/deepin/deepin-screen-recorder
  wait: 0.3
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 200
    y: 200
  end:
    x: 800
    y: 600
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击保存按钮打开菜单
  action: element_action
  ref: save_local_button
  do: click
  wait: 0.5
- name: 等待菜单展开
  action: wait
  wait: 0.5
- name: 验证保存菜单选项
  action: screenshot
- name: 选择每次询问
  action: main_menu_comb
  ref: save_menu_ask
  wait: 0.5
- name: 点击保存按钮
  action: element_action
  ref: save_local_button
  do: click
  wait: 1.0
- name: 验证文管弹窗默认路径为桌面
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
