name: 主屏截图-图片保存到桌面-查看截图图片
app: deepin-screen-recorder
module: 截图录屏/设置
feature: 保存位置
tags:
- L0
vars:
  xlsx_id: '1644657'
  case_type: 功能测试
description: '前置条件: None

  测试步骤:

  1. 快捷键ctrl+alt+a,唤起截图功能

  2. 框选截图录屏功能

  3. 点击确定，选择保存位置到桌面

  4. 打开桌面的图片

  预期结果:

  1. 截图功能唤起成功

  2. 框选成功

  3. 截图图片保存到桌面

  4. 截图的图片显示正常，无位移的现象

  '
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 1.0
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 200
    y: 200
  end:
    x: 800
    y: 600
  wait: 0.5
- name: 等待工具栏出现
  action: wait
  wait: 1.0
- name: 点击保存按钮打开菜单
  action: element_action
  ref: save_local_button
  do: click
  wait: 0.5
- name: 等待菜单展开
  action: wait
  wait: 0.5
- name: 选择保存到桌面
  action: main_menu_comb
  ref: save_menu_desktop
  wait: 0.5
- name: 按Enter完成截图
  action: keyboard_press
  keys: Return
  wait: 2.0
- name: 验证截图保存到桌面
  action: screenshot
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
skip: ''
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
