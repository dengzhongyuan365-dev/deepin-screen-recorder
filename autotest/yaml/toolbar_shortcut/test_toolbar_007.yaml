name: 区域位置-快捷键调整-向左移动
app: deepin-screen-recorder
description: '前置条件: 无

  测试步骤:

  1. 按 ←

  预期结果:

  1. 向左移动，每次移动1px

  '
module: 截图录屏/工具栏
feature: 快捷键
tags:
- L2
vars:
  xlsx_id: '1645117'
  case_type: 功能测试
steps:
- name: 唤起截图模式
  action: keyboard_hot_key
  keys: ctrl,alt,a
  wait: 0.5
- name: 框选截图区域
  action: mouse_drag
  start:
    x: 500
    y: 300
  end:
    x: 1200
    y: 700
  wait: 0.5
- name: 按向左箭头-向左移动选区
  action: keyboard_press
  keys: Left
  wait: 0.3
- name: 再次按向左箭头
  action: keyboard_press
  keys: Left
  wait: 0.3
- name: 验证选区向左移动
  action: screenshot
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
teardown:
- action: keyboard_press
  keys: Escape
  wait: 0.3
