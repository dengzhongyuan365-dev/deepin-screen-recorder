name: 截图终端命令-帮助信息命令
app: deepin-screen-recorder
description: '前置条件: 无

  测试步骤:

  1. 打开终端，在终端中输入deepin-screen-recorder -h 回车

  2. 打开终端，在终端中输入deepin-screen-recorder --help 回车

  预期结果:

  1. 软件会显示出截图的命令帮助选项

  2. 软件会显示出截图的命令帮助选项

  '
module: 截图录屏/工具栏
feature: 命令行
tags:
- L3
vars:
  xlsx_id: '1644759'
  case_type: 功能测试
steps:
- name: 打开终端
  action: keyboard_hot_key
  keys: ctrl,alt,t
  wait: 1.0
- name: 输入deepin-screen-recorder -h命令
  action: keyboard_type
  keys: deepin-screen-recorder -h
- name: 按回车执行
  action: keyboard_press
  keys: Return
  wait: 1.0
- name: 验证帮助信息输出包含Usage
  action: screenshot
- name: 关闭当前终端
  action: keyboard_press
  keys: ctrl,shift,w
  wait: 0.3
- name: 打开终端
  action: keyboard_hot_key
  keys: ctrl,alt,t
  wait: 1.0
- name: 输入deepin-screen-recorder --help命令
  action: keyboard_type
  keys: deepin-screen-recorder --help
- name: 按回车执行
  action: keyboard_press
  keys: Return
  wait: 1.0
- name: 验证帮助信息输出包含Usage
  action: screenshot
teardown: []
setup:
  - action: session_start
    command: "deepin-screen-recorder"
    wait: 3.0
